---
- name: Deploy Winlogbeat -> Graylog
  hosts: windows
  gather_facts: true

  roles:
    - role: joe-speedboat.log_forwarder
      vars:
        winlogbeat_graylog_host: graylog.example.com
        winlogbeat_graylog_port: 5044
        # Optional: override node name if you need a static collector ID for all Windows hosts
        # winlogbeat_node_name: "{{ inventory_hostname }}"
        winlogbeat_fields:
          journal_forwarder: "true"

- name: Deploy Linux logs -> Graylog
  hosts: linux
  gather_facts: true

  roles:
    - role: joe-speedboat.log_forwarder
      vars:
        log_forwarder_graylog_gelf_host: graylog.example.com
        log_forwarder_graylog_gelf_port: 12201
...