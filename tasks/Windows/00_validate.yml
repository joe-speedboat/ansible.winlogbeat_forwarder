---
# Windows/00_validate.yml - runtime validation for Windows targets

- name: Assert required variables are set
  ansible.builtin.assert:
    that:
      - winlogbeat_graylog_host is defined
      - winlogbeat_graylog_host | length > 0
      - winlogbeat_graylog_port is defined
      - winlogbeat_graylog_port is number
      - winlogbeat_version is defined
    fail_msg: >
      Missing required variable(s):
      winlogbeat_graylog_host (Graylog server address),
      winlogbeat_graylog_port (Graylog Beats port, default 5044),
      winlogbeat_version (Winlogbeat release version)

- name: Assert supported Windows release
  ansible.builtin.assert:
    that:
      - ansible_distribution_version is version('10.0.17763', '>=')
    fail_msg: >
      This role requires Windows Server 2019 or newer.
      Detected: {{ ansible_os_name }} {{ ansible_distribution_version }}

- name: Initialize effective Winlogbeat event logs
  ansible.builtin.set_fact:
    winlogbeat_event_logs_effective: []

- name: Use explicitly configured Winlogbeat event logs
  ansible.builtin.set_fact:
    winlogbeat_event_logs_effective: "{{ winlogbeat_event_logs }}"
  when: winlogbeat_event_logs is defined

- name: Build Winlogbeat event logs from selected groups
  ansible.builtin.set_fact:
    winlogbeat_event_logs_effective: >-
      {{ winlogbeat_event_logs_effective + (winlogbeat_event_log_group_definitions[item] | default([])) }}
  loop: "{{ winlogbeat_event_log_groups | default(['baseline']) }}"
  when: winlogbeat_event_logs is not defined

- name: Assert at least one Winlogbeat event log is configured
  ansible.builtin.assert:
    that:
      - winlogbeat_event_logs_effective | length > 0
    fail_msg: >
      No Winlogbeat event logs are configured. Set winlogbeat_event_logs or
      select at least one valid winlogbeat_event_log_groups entry.

- name: List available Windows Event Log channels
  ansible.windows.win_shell: |
    Get-WinEvent -ListLog * -ErrorAction SilentlyContinue |
      Select-Object -ExpandProperty LogName
  register: winlogbeat_available_event_channels_result
  changed_when: false
  when: winlogbeat_validate_event_channels | bool

- name: Calculate missing Winlogbeat event channels
  ansible.builtin.set_fact:
    winlogbeat_configured_event_channel_names: >-
      {{ winlogbeat_event_logs_effective | map(attribute='name') | list | unique | sort }}
    winlogbeat_missing_event_channels: >-
      {{ (winlogbeat_event_logs_effective | map(attribute='name') | list)
         | difference(winlogbeat_available_event_channels_result.stdout_lines | default([])) }}
  when: winlogbeat_validate_event_channels | bool

- name: List configured Windows Event Log channels selected for forwarding
  ansible.windows.win_shell: |
    $configuredJson = @'
    {{ winlogbeat_configured_event_channel_names | to_json }}
    '@
    $configuredChannels = $configuredJson | ConvertFrom-Json
    $available = @{}

    Get-WinEvent -ListLog * -ErrorAction SilentlyContinue |
      ForEach-Object {
        $available[$_.LogName] = $_.RecordCount
      }

    foreach ($channel in $configuredChannels) {
      $name = [string]$channel
      if ($available.ContainsKey($name)) {
        $recordCount = $available[$name]
        if ($null -eq $recordCount) {
          $recordCount = 0
        }
        "{0} (records={1})" -f $name, $recordCount
      } else {
        "{0} (missing)" -f $name
      }
    }
  register: winlogbeat_configured_event_channels_result
  changed_when: false
  when: winlogbeat_validate_event_channels | bool

- name: Store Windows Event Log configured channel report
  ansible.builtin.set_fact:
    winlogbeat_configured_event_channel_report: "{{ winlogbeat_configured_event_channels_result.stdout_lines | default([]) }}"
  when: winlogbeat_validate_event_channels | bool

- name: List populated Windows Event Log channels not forwarded to Graylog
  ansible.windows.win_shell: |
    $configuredJson = @'
    {{ winlogbeat_configured_event_channel_names | to_json }}
    '@
    $configuredChannels = $configuredJson | ConvertFrom-Json
    $configuredSet = [System.Collections.Generic.HashSet[string]]::new([System.StringComparer]::OrdinalIgnoreCase)
    foreach ($channel in $configuredChannels) {
      [void]$configuredSet.Add([string]$channel)
    }

    Get-WinEvent -ListLog * -ErrorAction SilentlyContinue |
      Where-Object { $_.RecordCount -gt 0 -and -not $configuredSet.Contains($_.LogName) } |
      Sort-Object LogName |
      ForEach-Object { "{0} (records={1})" -f $_.LogName, $_.RecordCount }
  register: winlogbeat_unforwarded_event_channels_result
  changed_when: false
  when:
    - winlogbeat_validate_event_channels | bool
    - winlogbeat_report_unforwarded_event_channels | bool

- name: Store Windows Event Log unforwarded channel report
  ansible.builtin.set_fact:
    winlogbeat_unforwarded_event_channel_report: "{{ winlogbeat_unforwarded_event_channels_result.stdout_lines | default([]) }}"
  when:
    - winlogbeat_validate_event_channels | bool
    - winlogbeat_report_unforwarded_event_channels | bool

- name: Report Windows Event Log channel coverage
  ansible.builtin.debug:
    msg:
      - "Configured Windows Event Log channels selected for Winlogbeat forwarding on {{ inventory_hostname }}:"
      - "configured_count={{ winlogbeat_configured_event_channel_names | length }}"
      - "{{ winlogbeat_configured_event_channel_report }}"
      - "Windows Event Log channels with records on {{ inventory_hostname }} but not selected for Winlogbeat forwarding:"
      - "unforwarded_count={{ winlogbeat_unforwarded_event_channel_report | length }}"
      - "{{ winlogbeat_unforwarded_event_channel_report }}"
  when:
    - winlogbeat_validate_event_channels | bool
    - winlogbeat_report_unforwarded_event_channels | bool
    - winlogbeat_unforwarded_event_channel_report | length > 0
...
