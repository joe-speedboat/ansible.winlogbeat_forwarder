---
# Windows/20_configure.yml - deploy configuration and restart on changes

- name: Deploy winlogbeat.yml
  ansible.windows.win_template:
    src: winlogbeat.yml.j2
    dest: '{{ winlogbeat_config }}'
  notify: restart winlogbeat

- name: Validate Winlogbeat configuration
  ansible.windows.win_command: >-
    "{{ winlogbeat_binary }}" test config
    -c "{{ winlogbeat_config }}"
    -e
  register: _winlogbeat_config_test
  changed_when: false

- name: Apply validated Winlogbeat configuration changes
  ansible.builtin.meta: flush_handlers
...
