---
- name: Stop and disable Fluent Bit service
  ansible.builtin.systemd:
    name: fluent-bit
    state: stopped
    enabled: false
  ignore_errors: true

- name: Remove Fluent Bit package
  ansible.builtin.dnf:
    name: "{{ pkg_rhel_fluent_bit }}"
    state: absent
  ignore_errors: true

- name: Remove Fluent Bit configuration and data
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/fluent-bit
    - /var/lib/fluent-bit
    - /opt/fluent-bit
  ignore_errors: true

- name: Remove audit packages
  ansible.builtin.dnf:
    name: "{{ pkg_rhel_log_forwarder_audit }}"
    state: absent
  ignore_errors: true
  when:
    - log_forwarder_audit_enabled | bool
    - log_forwarder_audit_remove | bool

- name: Remove audit rules
  ansible.builtin.file:
    path: "{{ log_forwarder_audit_rules_file }}"
    state: absent
  ignore_errors: true
  notify: reload audit rules

- name: Remove Fluent Bit repository
  ansible.builtin.yum_repository:
    name: fluent-bit
    state: absent
  ignore_errors: true
  when: log_forwarder_remove_repo | bool
...