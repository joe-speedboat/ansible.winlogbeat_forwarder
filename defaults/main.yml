---
# Winlogbeat OSS version - latest tested OSS release for Apache 2.0 licensing
winlogbeat_version: '9.4.2'
winlogbeat_artifact_name: "winlogbeat-oss-{{ winlogbeat_version }}-windows-x86_64"
winlogbeat_download_url: "https://artifacts.elastic.co/downloads/beats/winlogbeat/{{ winlogbeat_artifact_name }}.zip"
winlogbeat_checksum:
  '7.17.28': 'f62297b195ed5e3328a77206ae19adf96081a8c385c5739831429ce9770c3be280095587bf814978a9664f180773bcf8063219be749d6fb258659e2be69afac5'
  '7.17.29': '2262ee3fdae8bf88728ce0c630aafff141b873dc4d2c9eeef9dcdca64a174fba5ba9125f7ea898a34dcd352d63eba993e03941c4a1e1624e5cc24a2c8431bc53'
  '9.4.2': 'a2ae67cbc8a6eed4c3c4e9360eaf437d465868d837e90426057260ac548139cf546082eb16249d760c9abe6b61243acee4507d7298396c77dcd9909dba9901a6'

# Installation paths (Windows)
winlogbeat_install_root: 'C:\Program Files\Winlogbeat'
winlogbeat_data_dir: 'C:\ProgramData\Winlogbeat'
winlogbeat_log_dir: 'C:\ProgramData\Winlogbeat\Logs'
winlogbeat_download_dir: 'C:\Windows\Temp\winlogbeat'

# Graylog Beats input (Windows)
winlogbeat_graylog_host: graylog.example.com
winlogbeat_graylog_port: 5044

# Event log channels (Windows)
# Collect all built-in curated groups by default. Override this list to select
# only specific categories, or set winlogbeat_event_logs directly if you need a
# complete manual channel override.
winlogbeat_event_log_groups: "{{ winlogbeat_event_log_group_definitions.keys() | list }}"

# Example: collect only a small baseline set.
# winlogbeat_event_log_groups:
#   - baseline
#   - powershell
#   - task_scheduler

# Validate event channels during deployment.
winlogbeat_validate_event_channels: true

# Report target channels that contain records but are not selected for
# Winlogbeat forwarding. This helps identify logs that exist on the host and
# are not currently forwarded to Graylog.
winlogbeat_report_unforwarded_event_channels: true

